# constraints.yaml - Machine-readable engineering constraints.
# Generated by eng-init. Keep thresholds and regexes here first; tools should reference this file.

code_canonicality:
  forbidden_suffixes:
    description: "Filenames/identifiers matching these patterns are rejected at commit"
    patterns:
      - "_v[0-9]+$"
      - "_new$"
      - "_old$"
      - "_backup$"
      - "_temp$"
      - "_copy$"
      - "_final$"
      - "_real$"
      - "_improved$"
      - "_refactored$"
      - "_fixed$"
      - "_legacy$"
      - "_deprecated$"
      - "V[0-9]+$"
      - "New$"
      - "Old$"
      - "Legacy$"
      - "Deprecated$"
      - "Backup$"
    enforced_by: ".git-hooks/check-naming.sh"
  scratchpad_directories:
    description: "Directories that must never appear in commits"
    paths: ["tmp", "scratch", "backup", "_old", "deprecated", "archive", "wip"]
    enforced_by: ".git-hooks/check-naming.sh"

size_limits:
  max_file_lines:
    value: 500
    description: "Files exceeding this should be split by package responsibility"
    enforced_by: "review"
  max_function_lines:
    value: 100
    description: "Functions exceeding this need explicit review justification"
    enforced_by: "review"
  max_pr_diff_lines:
    value: 400
    description: "PRs exceeding this require justification or splitting"
    enforced_by: ".github/PULL_REQUEST_TEMPLATE.md"

testing:
  min_line_coverage:
    value: 70
    mode: report-only
    enforced_by: "make coverage + CI artifact"
  tdd_mode:
    value: "preferred"
  forbid_mock_of_system_under_test:
    value: true

dependencies:
  min_release_age_days:
    value: 3
    enforced_by: ".github/dependabot.yml + review"
  no_circular_dependencies:
    value: true
    enforced_by: "go compiler"
  new_dependency_requires_justification:
    value: true
    enforced_by: ".github/PULL_REQUEST_TEMPLATE.md"
  allowed_licenses:
    value: ["MIT", "Apache-2.0", "BSD-3-Clause", "ISC"]
    enforced_by: "review"

anti_drift:
  duplicate_code_threshold_tokens:
    value: 100
    enforced_by: "dupl"
  dead_code_min_confidence:
    value: 80
    enforced_by: "golangci-lint unused"

module_boundaries:
  layers: ["cmd", "pkg/api", "pkg/model", "pkg/tool", "pkg/middleware", "pkg/hooks", "pkg/sandbox", "pkg/config", "pkg/message", "pkg/mcp", "pkg/runtime"]
  forbidden_import_patterns:
    - "pkg/* importing examples/*"
    - "lower-level pkg importing pkg/api"
  enforced_by: "review + go test ./..."

commits:
  conventional_commits_required:
    value: true
    allowed_types: ["feat", "fix", "refactor", "chore", "docs", "test", "ci", "build", "perf"]
    enforced_by: ".git-hooks/commit-msg when core.hooksPath=.git-hooks"
    agent_co_author_required: true

ci:
  risk_layers: 3
  fast_checks_timeout_minutes: 5
  matrix: ["ubuntu-latest", "macos-latest", "windows-latest"]
