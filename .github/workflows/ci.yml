name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.24'
          check-latest: true

      - name: Naming guard
        run: make naming-check

      - name: Format
        run: make fmt-check

      - name: Tidy check
        run: make tidy-check

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.64.2
          args: --timeout=5m

      - name: Duplicate code check
        run: |
          go install github.com/mibk/dupl@latest
          make duplicate-check

  test:
    needs: fast-checks
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.24'
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Test (race)
        if: matrix.os == 'ubuntu-latest'
        run: go test -race ./...

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.24'
          check-latest: true

      - name: Coverage
        run: make coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: error
